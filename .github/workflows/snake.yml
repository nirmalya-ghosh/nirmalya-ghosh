name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake animations
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7C3AED&color_dots=#EBEDF0,#A7F3D0,#58A6FF,#7C3AED,#F97316
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#A78BFA
            dist/github-contribution-grid-snake.gif?color_snake=#7C3AED&color_dots=#EBEDF0,#A7F3D0,#58A6FF,#7C3AED,#F97316

      - name: Publish snake animations to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
